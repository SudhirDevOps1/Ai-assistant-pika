<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" /> <!-- cyan-400 -->
      <stop offset="100%" stop-color="#a855f7" /> <!-- purple-500 -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="100" height="100" rx="25" fill="url(#bg)" />
  
  <!-- Outer spark/bot frame -->
  <path d="M50 15 C70 15 85 30 85 50 C85 70 70 85 50 85 C30 85 15 70 15 50 C15 30 30 15 50 15 Z" fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.3" stroke-dasharray="10 5" />
  
  <!-- The 'P' shape with an AI node style -->
  <path d="M 35 70 L 35 30 L 55 30 C 65 30 65 50 55 50 L 35 50" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- AI Dot 1 -->
  <circle cx="55" cy="40" r="5" fill="#ffffff" filter="url(#glow)" />
  
  <!-- Spark top right -->
  <path d="M 65 25 L 75 25 L 70 15 Z" fill="#ffffff" opacity="0.8" />
  <path d="M 75 35 L 85 35 L 80 25 Z" fill="#ffffff" opacity="0.5" />
</svg>
