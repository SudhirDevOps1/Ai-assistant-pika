<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" /> <!-- deep indigo -->
      <stop offset="100%" stop-color="#3b0764" /> <!-- deep purple -->
    </linearGradient>
    
    <!-- Glow filter for the 'P' -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Neon gradient for the 'P' -->
    <linearGradient id="pGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" /> <!-- sky blue -->
      <stop offset="100%" stop-color="#a78bfa" /> <!-- soft purple -->
    </linearGradient>
    
    <!-- Orbital ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.2" />
    </linearGradient>
    
    <!-- Particle glow -->
    <filter id="particleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Rounded dark background -->
  <rect width="120" height="120" rx="28" fill="url(#bgGrad)" />
  
  <!-- Outer glow ring (orbital) -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="url(#ringGrad)" stroke-width="2" stroke-dasharray="8 6" opacity="0.7" />
  
  <!-- Subtle grid/dot pattern in background -->
  <g fill="#ffffff" opacity="0.08">
    <circle cx="25" cy="25" r="1.5" />
    <circle cx="45" cy="20" r="1" />
    <circle cx="70" cy="18" r="1.5" />
    <circle cx="95" cy="30" r="1" />
    <circle cx="20" cy="55" r="1" />
    <circle cx="100" cy="55" r="1.5" />
    <circle cx="25" cy="85" r="1" />
    <circle cx="50" cy="95" r="1.5" />
    <circle cx="80" cy="90" r="1" />
    <circle cx="95" cy="75" r="1" />
  </g>
  
  <!-- The 'P' shape – stylized and tech-forward -->
  <g filter="url(#glow)">
    <!-- Vertical stroke of 'P' -->
    <rect x="38" y="28" width="10" height="56" rx="5" fill="url(#pGrad)" />
    <!-- Curve of 'P' (top part) -->
    <path d="M 48 28 L 70 28 C 82 28 82 52 70 52 L 48 52" fill="none" stroke="url(#pGrad)" stroke-width="10" stroke-linecap="round" />
  </g>
  
  <!-- AI Neural node on the 'P' curve -->
  <circle cx="66" cy="40" r="6" fill="#ffffff" filter="url(#particleGlow)" />
  <circle cx="66" cy="40" r="2.5" fill="#1e1b4b" />
  
  <!-- Small node connectors -->
  <line x1="66" y1="34" x2="66" y2="28" stroke="#a78bfa" stroke-width="1.5" opacity="0.6" />
  <line x1="66" y1="46" x2="66" y2="52" stroke="#a78bfa" stroke-width="1.5" opacity="0.6" />
  <line x1="60" y1="40" x2="48" y2="40" stroke="#a78bfa" stroke-width="1.5" opacity="0.6" />
  
  <!-- Spark / tech accent (top right) -->
  <g transform="translate(78, 18)" opacity="0.9">
    <path d="M 0 0 L 12 0 L 8 -8 Z" fill="#38bdf8" filter="url(#particleGlow)" />
    <path d="M 14 2 L 24 2 L 20 -6 Z" fill="#a78bfa" opacity="0.6" />
  </g>
  
  <!-- Bottom spark -->
  <g transform="translate(32, 82)" opacity="0.7">
    <path d="M 0 0 L 8 0 L 5 -5 Z" fill="#38bdf8" filter="url(#particleGlow)" />
  </g>
  
  <!-- Floating AI particles -->
  <circle cx="85" cy="70" r="3" fill="#38bdf8" opacity="0.7" filter="url(#particleGlow)" />
  <circle cx="30" cy="65" r="2" fill="#a78bfa" opacity="0.6" />
  <circle cx="75" cy="85" r="2.5" fill="#38bdf8" opacity="0.5" />
  
  <!-- Subtle inner glow on background -->
  <circle cx="60" cy="60" r="45" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.15" />
</svg>
